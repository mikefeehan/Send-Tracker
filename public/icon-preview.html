<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Icon Preview</title>
  <style>
    body {
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    }
    .container {
      text-align: center;
    }
    svg {
      width: 300px;
      height: 300px;
      filter: drop-shadow(0 20px 40px rgba(244, 63, 94, 0.3));
    }
    p {
      color: #fff;
      margin-top: 30px;
      font-size: 18px;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="container">
    <svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'>
      <defs>
        <linearGradient id='grad2' x1='0%' y1='0%' x2='100%' y2='100%'>
          <stop offset='0%' style='stop-color:#f43f5e;stop-opacity:1' />
          <stop offset='100%' style='stop-color:#a855f7;stop-opacity:1' />
        </linearGradient>
      </defs>
      <rect width='512' height='512' fill='#06111a'/>
      <g transform='translate(256,256)'>
        <circle cx='0' cy='0' r='180' fill='url(#grad2)' opacity='0.9'/>
        <text y='80' font-size='200' text-anchor='middle' fill='white' dominant-baseline='middle'>🍹</text>
      </g>
    </svg>
    <p>Your new home screen icon!</p>
  </div>
</body>
</html>
